<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>엄마표 영어 원서 가이드 | 인기 영어 원서 챕터북</title>
  <meta name="description" content="영어를 잘 못해도 괜찮아요. 아이와 함께 영어 원서를 읽을 수 있도록 챕터별 단어와 질문을 정리했습니다." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#b8451a" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#13110d" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="엄마표 원서" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Set theme attribute BEFORE CSS loads to avoid flash -->
  <script>
    (function() {
      try {
        var s = localStorage.getItem('ebm:theme');
        var pref = s ? JSON.parse(s) : 'auto';
        var dark = pref === 'dark' || (pref === 'auto' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#/" class="logo">
        <span class="logo-icon" aria-hidden="true">엄</span>
        <span class="logo-text">
          <span class="logo-title">엄마표 영어 원서 가이드</span>
          <span class="logo-sub">A Reading Companion</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="#/" class="nav-link">전체 도서</a>
        <a href="#/bookmarks" class="nav-link">내 단어장</a>
        <a href="#/guide" class="nav-link">사용 안내</a>
        <button class="nav-toggle" id="theme-toggle" type="button" aria-label="라이트/다크 모드 전환" title="라이트/다크 모드 전환">
          <span class="theme-icon theme-icon-light">☀️</span>
          <span class="theme-icon theme-icon-dark">🌙</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="app" class="container">
    <div class="loading">불러오는 중...</div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>영어가 서툰 엄마도 아이와 함께 원서를 읽을 수 있도록 만들었어요.</p>
      <p class="muted">© 엄마표 영어 원서 가이드 · 교육 목적 자료</p>
    </div>
  </footer>

  <!-- Storage / theme — load early -->
  <script src="js/storage.js"></script>

  <!-- Book Data -->
  <script src="js/data/mth-1.js"></script>
  <script src="js/data/mth-2.js"></script>
  <script src="js/data/mth-3.js"></script>
  <script src="js/data/atoz-1.js"></script>
  <script src="js/data/mercy-1.js"></script>
  <script src="js/data/dragon-1.js"></script>
  <script src="js/data/dragon-trainer-1.js"></script>
  <script src="js/data/books.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>

  <!-- PWA registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
